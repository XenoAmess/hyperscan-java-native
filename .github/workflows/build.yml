name: build
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
jobs:
  build-native:
    name: Build native libs
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-24.04
            platform: linux-x86_64-baseline
          - os: linux
            runner: ubuntu-24.04
            platform: linux-x86_64-avx2
          - os: linux
            runner: ubuntu-24.04
            platform: linux-x86_64
          - os: linux
            runner: ubuntu-24.04-arm
            platform: linux-arm64-baseline
          - os: linux
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows
            runner: windows-latest
            platform: windows-x86_64-baseline
          - os: windows
            runner: windows-latest
            platform: windows-x86_64-avx2
          - os: windows
            runner: windows-latest
            platform: windows-x86_64
    env:
      DETECTED_PLATFORM: ${{ matrix.platform }}
      STAGING: ${{ startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Build native binaries in centos container
        if: matrix.os == 'linux'
        uses: docker://ghcr.io/gliwka/centos7-toolchain:main@sha256:e6cf17223408bb4d1314be547d74b23d04bcf6480d2fe23822fb672a52775f76
        with:
          args: '"./build.sh"'
      - name: Set up Python
        if: matrix.os == 'windows'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Install ragel (MSYS2)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          C:/msys64/usr/bin/bash.exe -lc "pacman -Sy --noconfirm mingw-w64-ucrt-x86_64-ragel"
      - name: Setup MSVC dev command prompt
        if: matrix.os == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Build native binaries on Windows
        if: matrix.os == 'windows'
        shell: bash
        run: |
          export PATH="/c/msys64/ucrt64/bin:/c/msys64/usr/bin:$PATH"
          ./build-windows.sh
      - name: Verify ISA per variant
        if: matrix.os == 'linux' && startsWith(matrix.platform, 'linux-x86_64')
        run: |
          set -euo pipefail
          PLATFORM="${{ matrix.platform }}"
          find target/staging-deploy -path "*${PLATFORM}*" -name '*.so' | while read -r SO; do
            echo "Inspecting $SO"
            case "$PLATFORM" in
              linux-x86_64-baseline)
                # No VEX/EVEX at all
                if objdump -d "$SO" | grep -E '^[[:space:]]+[0-9a-f]+:[[:space:]]+[0-9a-f ]+[[:space:]]+v' > /dev/null 2>&1; then
                  echo "FAIL: $SO contains VEX/EVEX (AVX/AVX2/AVX-512) instructions"
                  objdump -d "$SO" | grep -nE '^[[:space:]]+[0-9a-f]+:[[:space:]]+[0-9a-f ]+[[:space:]]+v' | head -10
                  exit 1
                fi
                ;;
              linux-x86_64-avx2)
                # VEX (AVX/AVX2) allowed, but no EVEX (AVX-512)
                if objdump -d "$SO" | grep -E '^[[:space:]]+[0-9a-f]+:[[:space:]]+62[[:space:]]' > /dev/null 2>&1; then
                  echo "FAIL: $SO contains EVEX (AVX-512) instructions"
                  objdump -d "$SO" | grep -nE '^[[:space:]]+[0-9a-f]+:[[:space:]]+62[[:space:]]' | head -10
                  exit 1
                fi
                ;;
              linux-x86_64)
                # AVX-512 build: any SIMD encoding is allowed
                ;;
            esac
          done
          echo "PASS: ISA check passed for $PLATFORM"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: build-result-${{ matrix.platform }}
          path: target/staging-deploy

  package-native:
    name: Package unified native jars
    needs: build-native
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          path: target/variant-staging
          merge-multiple: false
      - name: Merge variants into unified classifier jars
        run: |
          set -euo pipefail
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          GROUP_DIR="${PWD}/target/staging-deploy/com/gliwka/hyperscan/native/${VERSION}"
          mkdir -p "$GROUP_DIR"

          # Locate the common artifacts (identical across variants) from the AVX-512 build.
          MAIN_JAR=$(find target/variant-staging -type f -name "native-${VERSION}.jar" | head -n1)
          SOURCES_JAR=$(find target/variant-staging -type f -name "native-${VERSION}-sources.jar" | head -n1)
          JAVADOC_JAR=$(find target/variant-staging -type f -name "native-${VERSION}-javadoc.jar" | head -n1)
          POM=$(find target/variant-staging -type f -name "native-${VERSION}.pom" | head -n1)
          for F in "$MAIN_JAR" "$SOURCES_JAR" "$JAVADOC_JAR" "$POM"; do
            if [ -z "$F" ] || [ ! -f "$F" ]; then
              echo "ERROR: missing common artifact"
              exit 1
            fi
            cp "$F" "$GROUP_DIR/"
          done

          # Locate the three linux-x86_64 variant classifier jars.
          LINUX_BASELINE_JAR=$(find target/variant-staging -type f -name "native-${VERSION}-linux-x86_64-baseline.jar" | head -n1)
          LINUX_AVX2_JAR=$(find target/variant-staging -type f -name "native-${VERSION}-linux-x86_64-avx2.jar" | head -n1)
          LINUX_AVX512_JAR=$(find target/variant-staging -type f -name "native-${VERSION}-linux-x86_64.jar" | head -n1)
          for F in "$LINUX_BASELINE_JAR" "$LINUX_AVX2_JAR" "$LINUX_AVX512_JAR"; do
            if [ -z "$F" ] || [ ! -f "$F" ]; then
              echo "ERROR: missing linux-x86_64 variant classifier jar"
              exit 1
            fi
          done

          # Merge the three linux-x86_64 variant native directories into one linux-x86_64 classifier jar.
          MERGE_DIR=$(mktemp -d)
          echo "Merging linux-x86_64 AVX-512 base from $LINUX_AVX512_JAR"
          unzip -q -o "$LINUX_AVX512_JAR" -d "$MERGE_DIR"
          echo "Overlaying linux-x86_64 AVX2 from $LINUX_AVX2_JAR"
          unzip -q -o "$LINUX_AVX2_JAR" -d "$MERGE_DIR"
          echo "Overlaying linux-x86_64 baseline from $LINUX_BASELINE_JAR"
          unzip -q -o "$LINUX_BASELINE_JAR" -d "$MERGE_DIR"
          (cd "$MERGE_DIR" && zip -r "$GROUP_DIR/native-${VERSION}-linux-x86_64.jar" .)
          rm -rf "$MERGE_DIR"

          # Locate the two linux-arm64 variant classifier jars.
          ARM64_BASELINE_JAR=$(find target/variant-staging -type f -name "native-${VERSION}-linux-arm64-baseline.jar" | head -n1)
          ARM64_SVE2_JAR=$(find target/variant-staging -type f -name "native-${VERSION}-linux-arm64.jar" | head -n1)
          for F in "$ARM64_BASELINE_JAR" "$ARM64_SVE2_JAR"; do
            if [ -z "$F" ] || [ ! -f "$F" ]; then
              echo "ERROR: missing linux-arm64 variant classifier jar"
              exit 1
            fi
          done

          # Merge the two linux-arm64 variant native directories into one linux-arm64 classifier jar.
          MERGE_DIR=$(mktemp -d)
          echo "Merging linux-arm64 SVE2 base from $ARM64_SVE2_JAR"
          unzip -q -o "$ARM64_SVE2_JAR" -d "$MERGE_DIR"
          echo "Overlaying linux-arm64 baseline from $ARM64_BASELINE_JAR"
          unzip -q -o "$ARM64_BASELINE_JAR" -d "$MERGE_DIR"
          (cd "$MERGE_DIR" && zip -r "$GROUP_DIR/native-${VERSION}-linux-arm64.jar" .)
          rm -rf "$MERGE_DIR"

          # Locate the three windows-x86_64 variant classifier jars.
          WIN_BASELINE_JAR=$(find target/variant-staging -type f -name "native-${VERSION}-windows-x86_64-baseline.jar" | head -n1)
          WIN_AVX2_JAR=$(find target/variant-staging -type f -name "native-${VERSION}-windows-x86_64-avx2.jar" | head -n1)
          WIN_AVX512_JAR=$(find target/variant-staging -type f -name "native-${VERSION}-windows-x86_64.jar" | head -n1)
          for F in "$WIN_BASELINE_JAR" "$WIN_AVX2_JAR" "$WIN_AVX512_JAR"; do
            if [ -z "$F" ] || [ ! -f "$F" ]; then
              echo "ERROR: missing windows-x86_64 variant classifier jar"
              exit 1
            fi
          done

          # Merge the three windows-x86_64 variant native directories into one windows-x86_64 classifier jar.
          MERGE_DIR=$(mktemp -d)
          echo "Merging windows-x86_64 AVX-512 base from $WIN_AVX512_JAR"
          unzip -q -o "$WIN_AVX512_JAR" -d "$MERGE_DIR"
          echo "Overlaying windows-x86_64 AVX2 from $WIN_AVX2_JAR"
          unzip -q -o "$WIN_AVX2_JAR" -d "$MERGE_DIR"
          echo "Overlaying windows-x86_64 baseline from $WIN_BASELINE_JAR"
          unzip -q -o "$WIN_BASELINE_JAR" -d "$MERGE_DIR"
          (cd "$MERGE_DIR" && zip -r "$GROUP_DIR/native-${VERSION}-windows-x86_64.jar" .)
          rm -rf "$MERGE_DIR"

          # Recreate maven metadata for the local staging repository.
          mkdir -p "target/staging-deploy/com/gliwka/hyperscan/native"
          UPDATED=$(date -u +%Y%m%d%H%M%S)
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<metadata>' \
            '  <groupId>com.gliwka.hyperscan</groupId>' \
            '  <artifactId>native</artifactId>' \
            '  <versioning>' \
            "    <release>${VERSION}</release>" \
            '    <versions>' \
            "      <version>${VERSION}</version>" \
            '    </versions>' \
            "    <lastUpdated>${UPDATED}</lastUpdated>" \
            '  </versioning>' \
            '</metadata>' \
            > "target/staging-deploy/com/gliwka/hyperscan/native/maven-metadata-local.xml"
          echo "Staging repository prepared at target/staging-deploy"
          find target/staging-deploy -type f
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: build-result-native-merged
          path: target/staging-deploy

  test-linux-x86_64:
    name: Test linux-x86_64 variants
    needs: package-native
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: build-result-native-merged
          path: target/staging-deploy
      - name: Build test classpath
        run: mvn -B dependency:build-classpath -Dmdep.outputFile=target/cp.txt -DincludeScope=test
      - name: Prepare classes and run end-to-end tests
        run: |
          set -euo pipefail
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          MAIN_JAR="target/staging-deploy/com/gliwka/hyperscan/native/${VERSION}/native-${VERSION}.jar"
          CLASSIFIER_JAR="target/staging-deploy/com/gliwka/hyperscan/native/${VERSION}/native-${VERSION}-linux-x86_64.jar"

          if [ ! -f "$MAIN_JAR" ] || [ ! -f "$CLASSIFIER_JAR" ]; then
            echo "ERROR: missing artifact jar"
            exit 1
          fi

          mkdir -p target/classes target/test-classes target/native-test
          unzip -q -o "$MAIN_JAR" -d target/classes
          unzip -q -o "$CLASSIFIER_JAR" -d target/native-test

          javac -cp "target/classes:$(cat target/cp.txt)" -d target/test-classes \
            src/test/java/com/gliwka/hyperscan/jni/EndToEndTest.java

          CP="target/classes:target/test-classes:target/native-test:$(cat target/cp.txt)"

          echo "=== default platform ==="
          java -cp "$CP" com.gliwka.hyperscan.jni.EndToEndTest

          echo "=== forced linux-x86_64-baseline ==="
          java -Dorg.bytedeco.javacpp.platform=linux-x86_64-baseline -cp "$CP" com.gliwka.hyperscan.jni.EndToEndTest

          echo "=== forced linux-x86_64-avx2 ==="
          java -Dorg.bytedeco.javacpp.platform=linux-x86_64-avx2 -cp "$CP" com.gliwka.hyperscan.jni.EndToEndTest

  test-linux-arm64:
    name: Test linux-arm64 variants
    needs: package-native
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: build-result-native-merged
          path: target/staging-deploy
      - name: Build test classpath
        run: mvn -B dependency:build-classpath -Dmdep.outputFile=target/cp.txt -DincludeScope=test
      - name: Prepare classes and run end-to-end tests
        run: |
          set -euo pipefail
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          MAIN_JAR="target/staging-deploy/com/gliwka/hyperscan/native/${VERSION}/native-${VERSION}.jar"
          CLASSIFIER_JAR="target/staging-deploy/com/gliwka/hyperscan/native/${VERSION}/native-${VERSION}-linux-arm64.jar"

          if [ ! -f "$MAIN_JAR" ] || [ ! -f "$CLASSIFIER_JAR" ]; then
            echo "ERROR: missing artifact jar"
            exit 1
          fi

          mkdir -p target/classes target/test-classes target/native-test
          unzip -q -o "$MAIN_JAR" -d target/classes
          unzip -q -o "$CLASSIFIER_JAR" -d target/native-test

          javac -cp "target/classes:$(cat target/cp.txt)" -d target/test-classes \
            src/test/java/com/gliwka/hyperscan/jni/EndToEndTest.java

          CP="target/classes:target/test-classes:target/native-test:$(cat target/cp.txt)"

          echo "=== default arm64 platform ==="
          java -cp "$CP" com.gliwka.hyperscan.jni.EndToEndTest

          echo "=== forced linux-arm64-baseline ==="
          java -Dorg.bytedeco.javacpp.platform=linux-arm64-baseline -cp "$CP" com.gliwka.hyperscan.jni.EndToEndTest

  test-windows-x86_64:
    name: Test windows-x86_64 variants
    needs: package-native
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: build-result-native-merged
          path: target/staging-deploy
      - name: Build test classpath
        shell: bash
        run: mvn -B dependency:build-classpath -Dmdep.outputFile=target/cp.txt -DincludeScope=test
      - name: Prepare classes and run end-to-end tests
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          MAIN_JAR="target/staging-deploy/com/gliwka/hyperscan/native/${VERSION}/native-${VERSION}.jar"
          CLASSIFIER_JAR="target/staging-deploy/com/gliwka/hyperscan/native/${VERSION}/native-${VERSION}-windows-x86_64.jar"

          if [ ! -f "$MAIN_JAR" ] || [ ! -f "$CLASSIFIER_JAR" ]; then
            echo "ERROR: missing artifact jar"
            exit 1
          fi

          mkdir -p target/classes target/test-classes target/native-test
          unzip -q -o "$MAIN_JAR" -d target/classes
          unzip -q -o "$CLASSIFIER_JAR" -d target/native-test

          javac -cp "target/classes:$(cat target/cp.txt)" -d target/test-classes \
            src/test/java/com/gliwka/hyperscan/jni/EndToEndTest.java

          CP="target/classes:target/test-classes:target/native-test:$(cat target/cp.txt)"

          echo "=== default platform ==="
          java -cp "$CP" com.gliwka.hyperscan.jni.EndToEndTest

          echo "=== forced windows-x86_64-baseline ==="
          java -Dorg.bytedeco.javacpp.platform=windows-x86_64-baseline -cp "$CP" com.gliwka.hyperscan.jni.EndToEndTest

          echo "=== forced windows-x86_64-avx2 ==="
          java -Dorg.bytedeco.javacpp.platform=windows-x86_64-avx2 -cp "$CP" com.gliwka.hyperscan.jni.EndToEndTest

  publish:
    if: contains(github.ref, 'refs/tags/v')
    needs:
      - package-native
      - test-linux-x86_64
      - test-linux-arm64
      - test-windows-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: build-result-native-merged
          path: target/staging-deploy
      - name: Merge multiple local repositories
        run: ./merge-artifacts.sh
      - uses: jreleaser/release-action@f69e545b05f149483cecb2fb81866247992694b8
        with:
          arguments: deploy --debug
        env:
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.SIGN_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.SIGN_KEY_PASS }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: releaser
          path: |
            target/staging-deploy
            out

project:
  version: 5.4.12-2.0.4-x6
  languages:
    java:
      version: "8"
      groupId: com.xenoamess.hyperscan
      artifactId: native
  name: hyperscan-java-native
  description: Native libraries for hyperscan java bindings
  links:
    homepage: https://github.com/XenoAmess/hyperscan-java-native
  license: BSD-3-Clause
  authors:
    - XenoAmess
deploy:
  maven:
    mavenCentral:
      hyperscan-java-native:
        active: ALWAYS
        url: https://central.sonatype.com/api/v1/publisher
        snapshotSupported: true
        applyMavenCentralRules: true
        stagingRepositories:
          - target/staging-deploy
        verifyUrl: 'https://repo1.maven.org/maven2/{{path}}/{{filename}}'
        namespace: com.xenoamess
signing:
  active: ALWAYS
  mode: MEMORY